version: 1
name: secrets-and-cfi
secrets: auto
control_flow_integrity: true

tasks:
  - id: fetch-data
    command: ["echo", "fetched data"]
    description: "Fetch external data"

  - id: process
    engine: claude
    model: haiku
    prompt: "Process the data"
    depends_on: [fetch-data]
    context_from: [fetch-data]
    context_budget_tokens: 4000
    observation_block: true
    timeout_sec: 120
    env:
      API_KEY: "test-key"
