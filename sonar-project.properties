# SonarQube Cloud (SonarCloud) configuration.
#
# Setup (one-time, on your side):
#   1. Sign in at https://sonarcloud.io with GitHub and import this repo.
#   2. In the project's Administration -> Analysis Method, DISABLE "Automatic
#      Analysis" (it conflicts with the CI-based scan in .github/workflows/sonarcloud.yml).
#   3. Add a repo secret SONAR_TOKEN (Account -> Security -> Generate Token).
#   4. If SonarCloud assigns a different organization/projectKey, update the two
#      values below and the README badge URLs to match.
sonar.projectKey=tiagojcperez_maestro-cli
sonar.organization=tiagojcperez

sonar.sources=src/maestro_cli
sonar.tests=tests
sonar.python.version=3.11, 3.12, 3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/__pycache__/**,**/tui/**,**/web/static/**
