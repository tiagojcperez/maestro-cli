name: 'Demo CI'

# Platform matrix (rendered as explicit jobs for deterministic CI output):
#   platform | validate job     | test job      | runner          | coverage
#   linux    | validate_linux   | test_linux    | ubuntu-latest   | required
#   windows  | validate_windows | test_windows  | windows-latest  | required
#   macos    | validate_macos   | test_macos    | macos-latest    | required
# Windows guidance: keep CI run steps portable (`python -m ...`, `maestro ...`).
# For Maestro plan tasks on Windows, prefer YAML list commands such as
# `["C:\Program Files\Git\bin\bash.exe", "-lc", "python -m pytest -q"]`
# and avoid bash-only string commands such as `bash -lc "python -m pytest -q"`.
# Inside Git Bash snippets, keep paths in forward-slash form such as `/c/project`.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-real-engine:
        description: 'Run the opt-in real-engine Maestro lane'
        required: false
        default: false
        type: boolean

jobs:
  # Validate and test run as explicit linux/windows/macos lanes.
  # Avoid matrix indirection here so generated examples stay easy to audit.
  validate_linux:
    name: 'Validate (Linux)'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Validate plan'
        run: 'maestro validate plans/demo.yaml'
  validate_windows:
    name: 'Validate (Windows)'
    runs-on: 'windows-latest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Validate plan'
        run: 'maestro validate plans/demo.yaml'
  validate_macos:
    name: 'Validate (macOS)'
    runs-on: 'macos-latest'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Validate plan'
        run: 'maestro validate plans/demo.yaml'
  test_linux:
    name: 'Test (Linux)'
    runs-on: 'ubuntu-latest'
    needs:
      - validate_linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Run tests'
        run: 'python -m pytest -q'
  test_windows:
    name: 'Test (Windows)'
    runs-on: 'windows-latest'
    needs:
      - validate_windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Run tests'
        run: 'python -m pytest -q'
  test_macos:
    name: 'Test (macOS)'
    runs-on: 'macos-latest'
    needs:
      - validate_macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Run tests'
        run: 'python -m pytest -q'
  maestro_real_engine:
    name: Run Maestro plan (real engine)
    if: github.event_name == 'workflow_dispatch' && inputs.run-real-engine
    needs:
      - test_linux
      - test_windows
      - test_macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Upgrade pip
        run: 'python -m pip install --upgrade pip'
      - name: Install dependencies
        run: 'python -m pip install -e . pytest'
      - name: 'Run Maestro plan'
        run: 'maestro run plans/demo.yaml --auto-approve'
