# Dependabot configuration — weekly GitHub Actions updates.
#
# Python dependency security is handled by the repository-level Dependabot
# *security* updates (driven by alerts), NOT by scheduled version bumps:
# maestro-cli is a library, so its dependency lower bounds are kept deliberately
# loose (the minimum that actually works) for maximum install compatibility and
# are not raised automatically. See:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # GitHub Actions used by .github/workflows/ci.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
