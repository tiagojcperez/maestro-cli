name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Offline-first: no engine CLIs, no secrets. Real-engine tests
# (tests/test_e2e_real_engines.py, marked `real_engine`) stay skipped because
# MAESTRO_RUN_REAL_ENGINE_TESTS is intentionally never set here.

jobs:
  doc-lint:
    name: doc-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run documentation lint
        run: python scripts/doc_lint.py

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Optional coverage backends. Each upload step is gated on its secret being
    # present, so CI stays green until you add the token. (Codecov + Coveralls
    # need no token on public repos.)
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # Single Windows lane keeps cross-platform coverage without
          # multiplying the full matrix across every Python version.
          - os: windows-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/requirements-ci.txt
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      # Installs are constrained to .github/requirements-ci.txt so CI runs are
      # reproducible; Dependabot bumps those pins via reviewable PRs.
      - name: Install maestro-cli with optional extras
        run: pip install -e ".[live,web,tui,agui,mcp,otel]" -c .github/requirements-ci.txt
      - name: Install pytest (not a runtime dependency)
        run: pip install pytest pytest-cov -c .github/requirements-ci.txt
      - name: Run test suite
        run: python -m pytest tests/ -q --cov=maestro_cli --cov-report=xml --cov-report=lcov --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: ./junit.xml
          fail_ci_if_error: false
      # --- Additional coverage backends (redundant validation + badges) ---
      # Coveralls: tokenless on public repos. Just enable the repo on coveralls.io.
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: ./coverage.lcov
          format: lcov
      # Codacy: runs only once CODACY_PROJECT_TOKEN is added to repo secrets.
      - name: Upload coverage to Codacy
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && env.CODACY_PROJECT_TOKEN != '' }}
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ./coverage.xml

  mypy:
    name: mypy
    # Run mypy on Windows: the codebase is a Windows-first project whose
    # `# type: ignore` comments are calibrated for the Windows mypy view. mypy's
    # results differ by host OS even with platform=win32, so running on Linux
    # produced unused-ignore/attribute churn that does not reflect a real defect.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/requirements-ci.txt
      - name: Install maestro-cli with optional extras
        # Install the optional extras so mypy can resolve rich/textual/fastapi/
        # etc. imports (live.py, tui/, web/) instead of erroring on missing stubs.
        run: pip install -e ".[live,web,tui,agui,mcp,otel]" -c .github/requirements-ci.txt
      - name: Install mypy + type stubs
        # The mypy pin lives in .github/requirements-ci.txt: newer mypy releases
        # change unused-ignore / attribute checks and would flag churn unrelated
        # to the code itself, so bumps arrive as reviewable Dependabot PRs.
        run: pip install mypy types-PyYAML -c .github/requirements-ci.txt
      - name: Run strict mypy over the package
        run: python -m mypy
