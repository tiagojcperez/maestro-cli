name: Real-engine smoke tests

# Real end-to-end tests that invoke an actual engine CLI (tests/test_e2e_real_engines.py,
# marked `real_engine`) — kept OUT of the normal offline CI.
#
# The `ollama` job below runs for FREE on the runner (no API keys, no secrets): it
# installs Ollama, pulls a small model, and exercises the real local-engine round-trip
# as a weekly + on-demand smoke test. Paid/cloud engines (codex/claude/gemini/qwen) are
# left as a documented opt-in extension at the bottom of this file.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ollama:
    name: Ollama smoke test (free, no secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MAESTRO_RUN_REAL_ENGINE_TESTS: "1"
      MAESTRO_E2E_OLLAMA_MODEL: "llama3.2:1b"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + pytest
        run: |
          pip install -e .
          pip install pytest

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull the model
        run: |
          # The installer may or may not auto-start the server; ensure it is up.
          (ollama serve > /tmp/ollama.log 2>&1 &) || true
          for i in $(seq 1 60); do ollama list >/dev/null 2>&1 && break; sleep 1; done
          ollama pull "$MAESTRO_E2E_OLLAMA_MODEL"
          ollama list

      - name: Run the Ollama real-engine round-trip
        run: python -m pytest tests/test_e2e_real_engines.py -v -m real_engine -k ollama

  # ---------------------------------------------------------------------------
  # Opt-in PAID engines (codex / claude / gemini / qwen). Disabled by default.
  #
  # To enable: set a repository variable RUN_REAL_ENGINE_TESTS=true, add the provider
  # secrets, install the engine CLIs, and set the per-engine model env vars the tests
  # read (e.g. MAESTRO_E2E_CODEX_MODEL). Then uncomment the job below.
  #
  # paid-engines:
  #   name: Paid engines (opt-in)
  #   runs-on: ubuntu-latest
  #   if: vars.RUN_REAL_ENGINE_TESTS == 'true'
  #   env:
  #     MAESTRO_RUN_REAL_ENGINE_TESTS: "1"
  #     MAESTRO_E2E_CODEX_MODEL: "5-mini"
  #     # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-python@v6
  #       with:
  #         python-version: "3.12"
  #     - run: pip install -e . && pip install pytest
  #     # - name: Install the engine CLIs you want to validate here
  #     - run: python -m pytest tests/test_e2e_real_engines.py -v -m real_engine
