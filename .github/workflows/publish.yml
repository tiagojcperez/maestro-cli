name: Publish to PyPI

# Publishes the `maestro-ai-cli` distribution to PyPI via OIDC Trusted Publishing
# — no API tokens or secrets are stored in the repo.
#
# Fires when a GitHub Release is published, or manually from the Actions tab
# (workflow_dispatch). Requires a Trusted Publisher to be configured on PyPI for
# this repository + this workflow file (see CONTRIBUTING / the release docs).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install build -c .github/requirements-ci.txt
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install twine -c .github/requirements-ci.txt
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Re-running this workflow on an already-published version (PyPI
          # versions are immutable) is a clean no-op instead of a 400 "file
          # already exists" failure. New versions still upload normally.
          skip-existing: true
