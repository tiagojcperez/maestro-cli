name: Generate demo GIFs

# Records the README demo GIFs with charmbracelet/vhs on a Linux runner and opens a
# PR with them (we don't push to main directly — branch protection requires checks).
#
# Run it manually: Actions -> "Generate demo GIFs" -> Run workflow.
#
# One-time prerequisite: enable "Allow GitHub Actions to create and approve pull
# requests" under Settings -> Actions -> General -> Workflow permissions, otherwise the
# PR step cannot open the pull request.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  gifs:
    name: Record demo GIFs and open a PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maestro (with the TUI extra) for the demos
        run: pip install -e ".[tui]"

      - name: Record the CLI demo (demo.gif)
        uses: charmbracelet/vhs-action@v2
        with:
          path: demo.tape

      - name: Record the TUI demo (demo-tui.gif)
        uses: charmbracelet/vhs-action@v2
        with:
          path: demo-tui.tape

      - name: Activate the README demo slot
        run: |
          python - <<'PY'
          import pathlib, re
          p = pathlib.Path("README.md")
          s = p.read_text(encoding="utf-8")
          # Unwrap the commented demo slot: <!-- ... ![Maestro CLI demo](demo.gif) ... -->
          s = re.sub(
              r"<!--[^>]*?(!\[Maestro CLI demo\]\(demo\.gif\)).*?-->",
              r"\1",
              s,
              flags=re.DOTALL,
          )
          p.write_text(s, encoding="utf-8")
          print("README demo slot activated.")
          PY

      - name: Open a PR with the generated GIFs
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/demo-gifs
          title: "docs: add generated demo GIFs"
          commit-message: "docs: add demo GIFs and activate the README demo slot"
          body: |
            Auto-generated by the **Generate demo GIFs** workflow (charmbracelet/vhs).

            - `demo.gif` — CLI run of the engine-free demo plan
            - `demo-tui.gif` — Textual TUI
            - README demo slot uncommented to show `demo.gif`

            Review the GIFs, then merge.
          add-paths: |
            demo.gif
            demo-tui.gif
            README.md
