name: SonarCloud

# Quality + coverage analysis on SonarQube Cloud. This is a separate workflow
# (it needs full git history for accurate new-code detection) and is NOT a
# required check, so it never blocks merges. Every meaningful step is gated on
# the SONAR_TOKEN secret, so the job is a fast no-op until you enable SonarCloud.
# See sonar-project.properties for the one-time setup steps.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Python
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/requirements-ci.txt
      - name: Install + generate coverage.xml
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[live,web,tui,agui,mcp,otel]" -c .github/requirements-ci.txt
          pip install pytest pytest-cov -c .github/requirements-ci.txt
          python -m pytest tests/ -q --cov=maestro_cli --cov-report=xml
      - name: Set up a JDK for the Sonar Scanner
        # The v8 action ships Sonar Scanner CLI 8.x, which otherwise tries to
        # auto-provision a JRE from scanner.sonarcloud.io (HTTP 403 on our
        # setup). We provide a JDK on the host and skip provisioning below to
        # avoid that download. NOTE: the scanner still runs on the action's own
        # bundled Java 17 regardless of this version (host Java config does not
        # reach it), so the "Java 17 scanner support ends 2026-07" warning is
        # action-side — deferred until SonarSource ships a Java-21 action.
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - name: SonarQube Cloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: "true"
