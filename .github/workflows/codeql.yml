name: CodeQL

# CodeQL static analysis (code scanning) for Python.
# Results appear under the repository Security tab → Code scanning.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 04:27 UTC — catches advisories that land between commits.
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          # security-extended keeps the full security query set without the noisy
          # maintainability/quality queries (unused imports, empty except, etc.).
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
